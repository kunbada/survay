<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 설문조사</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --gold: #C8A96E; --dark: #1A1A2E; --cream: #F5F0E8; --text: #2C2C2C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--text); }

        header { background: var(--dark); color: white; padding: 2rem 1rem; text-align: center; }
        header h1 { font-size: 1.4rem; color: var(--gold); margin-bottom: 5px; }

        .container { max-width: 500px; margin: 1.5rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 20px; padding: 1.5rem; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }

        /* 단계 표시 바 */
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .step-label { font-size: 0.8rem; color: #ccc; font-weight: bold; }
        .step-label.active { color: var(--dark); border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: -12px; }

        /* 질문 섹션 */
        .step-content { display: none; min-height: 250px; }
        .step-content.active { display: block; }

        .question { font-weight: bold; font-size: 1.1rem; margin-bottom: 1.2rem; display: block; line-height: 1.4; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        
        /* 버튼 스타일 */
        .opt-btn { padding: 1rem; border: 1px solid #ddd; border-radius: 12px; background: white; cursor: pointer; text-align: left; font-size: 1rem; }
        .opt-btn.selected { background: var(--dark); color: white; border-color: var(--dark); font-weight: bold; }

        /* 입력 폼 */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        
        /* 개인정보 동의 */
        .privacy-box { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 0.75rem; color: #777; height: 80px; overflow-y: scroll; margin: 10px 0; border: 1px solid #eee; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 2rem; }
        .btn { flex: 1; padding: 1rem; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-next { background: var(--dark); color: white; }
        .btn-prev { background: #eee; color: #666; }

        .success { text-align: center; padding: 2rem 0; }
    </style>
</head>
<body>

<header>
    <h1>실거주 환경 설문조사</h1>
</header>

<div class="container">
    <div class="card">
        <div class="progress-bar">
            <span class="step-label active" id="lab1">Q1</span>
            <span class="step-label" id="lab2">Q2</span>
            <span class="step-label" id="lab3">Q3</span>
            <span class="step-label" id="lab4">정보입력</span>
        </div>

        <div class="step-content active" id="step1">
            <span class="question">1. 현재 거주지의 주차 환경에 만족하시나요?</span>
            <div class="options">
                <button class="opt-btn" onclick="selectItem('q1', '만족', this)">만족함</button>
                <button class="opt-btn" onclick="selectItem('q1', '보통', this)">보통</button>
                <button class="opt-btn" onclick="selectItem('q1', '불만족', this)">불만족(공간부족)</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-next" onclick="goNext(2)">다음으로</button>
            </div>
        </div>

        <div class="step-content" id="step2">
            <span class="question">2. 이사 시 가장 중요하게 생각하는 입지는?</span>
            <div class="options">
                <button class="opt-btn" onclick="selectItem('q2', '교통', this)">지하철/교통 편의성</button>
                <button class="opt-btn" onclick="selectItem('q2', '교육', this)">우수한 학군/교육시설</button>
                <button class="opt-btn" onclick="selectItem('q2', '상권', this)">대형마트/상권 인프라</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-prev" onclick="goNext(1)">이전</button>
                <button class="btn btn-next" onclick="goNext(3)">다음으로</button>
            </div>
        </div>

        <div class="step-content" id="step3">
            <span class="question">3. 신규 분양 정보를 문자로 받으시겠습니까?</span>
            <div class="options">
                <button class="opt-btn" onclick="selectItem('q3', '예', this)">네, 받겠습니다</button>
                <button class="opt-btn" onclick="selectItem('q3', '아니오', this)">아니오, 괜찮습니다</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-prev" onclick="goNext(2)">이전</button>
                <button class="btn btn-next" onclick="goNext(4)">다음으로</button>
            </div>
        </div>

        <div class="step-content" id="step4">
            <span class="question">마지막으로 연락처를 남겨주세요</span>
            <div class="form-group">
                <label>성함</label>
                <input type="text" 
                    id="user-name" 
                    placeholder="홍길동" 
                    lang="ko" 
                    spellcheck="false" 
                    autocorrect="off" 
                    autocapitalize="off">
            </div>
            <div class="form-group">
                <label>연락처</label>
                <input type="tel" 
                        id="user-phone" 
                        placeholder="010-0000-0000" 
                        inputmode="tel" 
                        pattern="[0-9]*"
                        oninput="hyphen(this)">
            </div>
            <div class="privacy-box">
                개인정보 수집 이용 동의: 수집항목(성명, 연락처), 목적(분양 정보 안내), 보유기간(목적 달성 시까지)
            </div>
            <label style="font-size: 0.8rem; cursor:pointer;">
                <input type="checkbox" id="user-chk"> 위 약관에 동의합니다. (필수)
            </label>
            <div class="btn-row">
                <button class="btn btn-prev" onclick="goNext(3)">이전</button>
                <button class="btn btn-next" id="send-btn" onclick="submitData()">설문 제출</button>
            </div>
        </div>

        <div class="step-content success" id="step5">
            <h2 style="color:var(--dark);">감사합니다!</h2>
            <p style="margin-top:1rem;">설문 내용이 정상 접수되었습니다.</p>
            <button class="btn btn-next" style="margin-top:2rem;" onclick="location.reload()">처음으로</button>
        </div>
    </div>
</div>

<script>
    let answers = { q1: '', q2: '', q3: '' };

    function selectItem(q, val, el) {
        answers[q] = val;
        const btns = el.parentElement.querySelectorAll('.opt-btn');
        btns.forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }

    function goNext(step) {
        // 이전 질문 응답 체크
        if(step > 1 && step <= 4) {
            const prev = step - 1;
            if(prev < 4 && !answers['q' + prev]) return alert('답변을 선택해 주세요!');
        }

        // 화면 전환
        document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');

        // 상단 탭 상태 변경
        document.querySelectorAll('.step-label').forEach((l, i) => {
            l.classList.toggle('active', i === (step-1));
        });
    }

    async function submitData() {
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;
        const chk = document.getElementById('user-chk').checked;

        if(!name || !phone) return alert('정보를 모두 입력해 주세요.');
        if(!chk) return alert('개인정보 동의가 필요합니다.');

        const btn = document.getElementById('send-btn');
        btn.disabled = true; btn.innerText = "제출 중...";

        const payload = {
            name: name,
            phone: phone,
            q1: answers.q1,
            q2: answers.q2,
            q3: answers.q3,
            time: new Date().toLocaleString()
        };

        // 💡 여기에 구글 시트 URL을 넣으세요!
        const URL = "https://script.google.com/macros/s/AKfycbwyTvOFmNtP0bi5vw8PfPBdA3IWY67KNf3L8jqI8IObEtILWDcefpnFejHxPyZPzPKq6w/exec";

        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            goNext(5);
        } catch(e) {
            alert('전송 실패. 다시 시도해 주세요.');
            btn.disabled = false; btn.innerText = "설문 제출";
        }
    }

    function hyphen(obj) {
        obj.value = obj.value.replace(/[^0-9]/g, '').replace(/^(\d{2,3})(\d{3,4})(\d{4})$/, `$1-$2-$3`);
    }
</script>

</body>
</html>
